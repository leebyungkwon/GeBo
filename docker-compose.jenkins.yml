version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    # 재시작 정책: Docker 재시작 시 자동 복구
    restart: unless-stopped
    ports:
      # 호스트 8000 → 컨테이너 8080 (Jenkins 웹 UI)
      - "8000:8080"
      # Jenkins 에이전트 통신 포트
      - "50000:50000"
    volumes:
      # Jenkins 데이터 영구 저장 (c:\jenkins)
      - C:/jenkins:/var/jenkins_home
    environment:
      # Java 옵션 — 메모리 및 타임존 설정
      - JAVA_OPTS=-Duser.timezone=Asia/Seoul -Xmx1g
